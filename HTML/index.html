<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordle Game Home</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
</head>

<body>
    <div class="container">
        <h1>Welcome to Custom Wordle</h1>
        <p>This is a custom version of Wordle you can play locally with a friend.</p>
        <ul>
            <li>One player sets the solution word (must be valid).</li>
            <li>Another player tries to guess it in 6 tries.</li>
            <li>All guesses must be valid 5-letter words.</li>
        </ul>

        <h2>Game Modes</h2>
        <div class="button-group">
            <a href="game.html" class="button">Play Normal Mode</a>
            <a href="hard-game.html" class="button">Play Hard Mode</a>
        </div>
    </div>
</body>

</html>
